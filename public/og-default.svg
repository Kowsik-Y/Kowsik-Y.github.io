  <rect width="1200" height="630" fill="url(#bg)" />
  <circle cx="1030" cy="120" r="190" fill="#8b5cf6" opacity="0.16" />
  <circle cx="180" cy="560" r="220" fill="#22d3ee" opacity="0.14" />
