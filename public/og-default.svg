  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="55%" stop-color="#1e1b4b" />
      <stop offset="100%" stop-color="#0b1120" />
    </linearGradient>
